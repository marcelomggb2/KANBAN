name: Security Scan

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  manifest-policy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate manifest policy
        run: |
          node scripts/validate-manifest.js

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run secret scan script
        run: |
          chmod +x scripts/scan-secrets.sh
          scripts/scan-secrets.sh
